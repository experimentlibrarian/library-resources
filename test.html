                            <!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Evaluate AI Outputs</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#6C3FA0;--primary-light:#F0E6FF;--primary-dark:#4A2870;
  --success:#1B7D3A;--success-bg:#E8F5EC;
  --error:#C0392B;--error-bg:#FDECEB;
  --text:#1A1A2E;--text-light:#555;--bg:#F7F4FB;
  --card:#fff;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.08);
  --focus-ring:0 0 0 3px rgba(108,63,160,0.4);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
h1{font-size:1.8rem;color:var(--primary-dark);margin-bottom:.5rem}
h2{font-size:1.4rem;color:var(--primary-dark);margin-bottom:.25rem}
h3{font-size:1.1rem;color:var(--primary);margin-bottom:.75rem}

/* Focus & accessibility */
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* Screens */
.screen{display:none;max-width:1200px;margin:0 auto;padding:1.5rem}
.screen.active{display:block}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--primary-light);color:var(--primary-dark)}
.btn-secondary:hover{background:#E0D0F5}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Pathway cards */
.pathway-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;margin-top:1.5rem}
.pathway-card{background:var(--card);border:2px solid var(--primary-light);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:border-color .2s,box-shadow .2s;text-align:center}
.pathway-card:hover,.pathway-card:focus-visible{border-color:var(--primary);box-shadow:0 4px 16px rgba(108,63,160,.15)}
.pathway-card .icon{font-size:2.5rem;margin-bottom:.5rem}
.pathway-card h3{color:var(--primary-dark);margin-bottom:.25rem}
.pathway-card p{color:var(--text-light);font-size:.9rem}

/* Breadcrumb */
.breadcrumb{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin-bottom:1.25rem;font-size:.9rem;color:var(--text-light)}
.breadcrumb button{background:none;border:none;color:var(--primary);cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:4px}
.breadcrumb button:hover{text-decoration:underline}
.breadcrumb .sep{color:#ccc}
.breadcrumb .current{font-weight:600;color:var(--text)}

/* Step indicator */
.step-indicator{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding:.75rem 1rem;background:var(--primary-light);border-radius:8px;font-weight:600;color:var(--primary-dark)}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;background:#fff;color:var(--primary);border:2px solid var(--primary-light)}
.step-dot.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.step-dot.done{background:var(--success);color:#fff;border-color:var(--success)}

/* 3-column layout */
.three-col{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:1.25rem;align-items:start}
.col-panel{background:var(--card);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.col-panel h3{margin-top:0;padding-bottom:.5rem;border-bottom:2px solid var(--primary-light)}
@media(max-width:960px){.three-col{grid-template-columns:1fr}}

/* Two-column layout for activities 2 & 3 */
.two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:1.25rem;align-items:start}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}

/* Chat bubbles */
.chat-area{display:flex;flex-direction:column;gap:.75rem;margin-top:.75rem}
.chat-turn{display:flex;flex-direction:column;gap:.25rem}
.chat-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-light);padding-left:.25rem}
.chat-bubble{padding:.85rem 1rem;border-radius:12px;font-size:.95rem;line-height:1.55;position:relative}
.chat-turn.student .chat-bubble{background:#E8F0FE;border-bottom-left-radius:4px;margin-right:2rem}
.chat-turn.ai .chat-bubble{background:#F5F5F5;border-bottom-right-radius:4px;margin-left:2rem}
.chat-turn.highlight .chat-bubble{box-shadow:0 0 0 2px var(--primary),0 0 12px rgba(108,63,160,.15)}

/* Guidance box */
.guidance-content{margin-top:.75rem;font-size:.95rem;line-height:1.6;color:var(--text)}
.tip-box{margin-top:1rem;padding:.85rem 1rem;background:#FFF8E7;border-left:3px solid #F0AD4E;border-radius:0 8px 8px 0;font-size:.9rem}
.tip-box strong{color:#946100}

/* Questions */
.question-block{margin-top:.75rem;padding:1rem;background:var(--bg);border-radius:8px}
.question-block p{font-weight:600;margin-bottom:.75rem;font-size:.95rem}
.options{display:flex;flex-direction:column;gap:.5rem}
.opt-btn{padding:.7rem 1rem;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:.95rem;cursor:pointer;text-align:left;transition:border-color .2s,background .2s}
.opt-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light)}
.opt-btn:disabled{cursor:not-allowed;opacity:.85}
.opt-btn.selected{border-color:var(--primary);background:var(--primary-light);font-weight:600}
.opt-btn.correct{border-color:var(--success);background:var(--success-bg)}
.opt-btn.incorrect{border-color:var(--error);background:var(--error-bg)}

/* Feedback */
.feedback{margin-top:.75rem;padding:.85rem 1rem;border-radius:8px;font-size:.9rem;line-height:1.5}
.feedback.correct{background:var(--success-bg);color:#145A2A;border-left:3px solid var(--success)}
.feedback.incorrect{background:var(--error-bg);color:#922B21;border-left:3px solid var(--error)}
.feedback.hidden{display:none}

/* Reveal animation */
.q-reveal{animation:slideReveal .4s ease-out}
@keyframes slideReveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Activity nav */
.activity-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #eee}

/* Check tabs */
.check-tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.check-tab{padding:.5rem 1rem;border:2px solid var(--primary-light);border-radius:8px;background:#fff;font-size:.9rem;cursor:pointer;font-weight:600;color:var(--text-light);transition:all .2s}
.check-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.check-tab.completed{background:var(--success-bg);border-color:var(--success);color:var(--success)}
.check-tab:hover:not(.active){border-color:var(--primary);color:var(--primary)}

/* Summary */
.summary-card{margin-bottom:1rem}
.summary-card .result{display:flex;align-items:center;gap:.5rem;padding:.5rem 0;border-bottom:1px solid #f0f0f0}
.summary-card .result:last-child{border-bottom:none}
.result-icon{font-size:1.2rem}

/* Activity intro */
.activity-intro{margin-bottom:1.25rem;padding:1rem 1.25rem;background:var(--primary-light);border-radius:var(--radius)}
.activity-intro h2{margin-bottom:.25rem}
.activity-intro p{color:var(--text-light);font-size:.95rem}

/* Continue button area */
.continue-area{margin-top:1rem;text-align:center}
.continue-area.hidden{display:none}
</style>
</head>
<body>

<!-- ============ WELCOME SCREEN ============ -->
<div id="welcome-screen" class="screen active">
  <div style="text-align:center;margin:2rem 0 1rem">
    <h1>🔍 Evaluate AI Outputs</h1>
    <p style="font-size:1.1rem;color:var(--text-light);max-width:640px;margin:.5rem auto">
      Learn to evaluate AI-generated content using three simple checks.<br>
      Choose a pathway that matches your area of study.
    </p>
  </div>
  <div class="pathway-grid" id="pathway-grid"></div>
</div>

<!-- ============ ACTIVITY SCREEN ============ -->
<div id="activity-screen" class="screen">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="check-tabs" id="check-tabs"></div>
  <div id="activity-content"></div>
  <div class="activity-nav" id="activity-nav"></div>
</div>

<!-- ============ SUMMARY SCREEN ============ -->
<div id="summary-screen" class="screen">
  <div style="text-align:center;margin-bottom:1.5rem">
    <h1>🎉 Activity Complete</h1>
    <p style="color:var(--text-light)">Here's a summary of your evaluations.</p>
  </div>
  <div id="summary-content"></div>
  <div style="text-align:center;margin-top:1.5rem">
    <button class="btn btn-secondary" onclick="goWelcome()">← Choose another pathway</button>
  </div>
</div>

<script>
/* ================================================================
   DATA
   ================================================================ */
const PATHWAYS = {
  business: {
    name: "Business", icon: "💼",
    description: "Evaluate AI responses about marketing, SMEs, and business strategy in New Zealand.",
    activities: [
      /* ---- Activity 1: What it says ---- */
      {
        check: 1, checkLabel: "What it says",
        title: "Check the facts and sources",
        subtitle: "Can you spot the difference between a real fact and a fabricated source?",
        scaffolded: true,
        stepsShowTurns: [2, 4],
        stepLabels: ["Step 1: Check the fact", "Step 2: Check the source"],
        conversation: [
          {role:"student", text:"I'm researching digital marketing strategies for small businesses in New Zealand. What percentage of NZ SMEs currently use social media for marketing?"},
          {role:"ai", text:"Great question! Based on recent data, approximately 70% of New Zealand SMEs actively use social media as part of their marketing strategy. This figure comes from the MYOB Future of Business report, which surveys small and medium enterprises across New Zealand and Australia on their business practices and technology adoption."},
          {role:"student", text:"That matches what I'm seeing in a couple of industry reports. Can you give me a specific source I could cite — something peer-reviewed if possible, published 2020 or later, with full publication details?"},
          {role:"ai", text:"Of course! Here's a peer-reviewed source you can cite:<br><br>Henderson, R., &amp; Patel, S. (2021). Digital marketing adoption among small and medium enterprises in New Zealand: Trends, challenges, and opportunities. <em>Journal of Asia-Pacific Digital Business</em>, 14(2), 45–67. https://doi.org/10.1177/20438761211024680<br><br>This study examines social media marketing adoption rates among NZ SMEs and found that approximately 68–72% were actively using social media platforms for business purposes by 2020."}
        ],
        stepGuidance: [
          {
            title: "Check the fact",
            content: "The AI states that around 70% of New Zealand SMEs use social media for marketing, citing the MYOB Future of Business report. Before trusting any statistic, ask yourself: does this figure sound reasonable? Could you find it in a reliable source like a government report or industry survey?",
            tip: "Try searching for <strong>'MYOB Future of Business report NZ SMEs social media'</strong> to see if this figure checks out."
          },
          {
            title: "Check the source",
            content: "The AI has now provided a peer-reviewed citation, complete with author names, a journal title, volume, page numbers, and a DOI. But just because a reference <em>looks</em> academic doesn't mean it's real. AI can fabricate convincing citations for articles that have never been published.",
            tip: "Try searching for the article title or DOI in <strong>Google Scholar</strong> or your <strong>library databases</strong>. If nothing comes up, the source is likely fabricated."
          }
        ],
        questions: [
          {
            id:"bus1q1", step:1,
            text: "Is the statistic that ~70% of NZ SMEs use social media marketing trustworthy?",
            options: ["Trustworthy", "Not trustworthy"],
            correct: 0,
            feedbackCorrect: "Good thinking! The ~70% figure is broadly consistent with real industry data, including the MYOB Future of Business report. The AI got this fact right — not everything AI generates is wrong.",
            feedbackIncorrect: "Actually, this statistic is broadly accurate. The MYOB Future of Business report and similar industry surveys do report comparable figures. The challenge with AI is knowing <em>which</em> parts to trust — and that requires checking."
          },
          {
            id:"bus1q2", step:2,
            text: "Is the Henderson &amp; Patel (2021) citation a real source?",
            options: ["Real source", "Fabricated source"],
            correct: 1,
            feedbackCorrect: "Well spotted! This citation is fabricated. The <em>Journal of Asia-Pacific Digital Business</em> doesn't exist, and you won't find this article in any database. AI often generates realistic-looking references — complete with authors, volume numbers, and DOIs — that are entirely made up. Always verify citations through your library or Google Scholar.",
            feedbackIncorrect: "This citation is actually fabricated. The <em>Journal of Asia-Pacific Digital Business</em> doesn't exist. The AI generated a convincing reference with plausible authors, a DOI, and page numbers — but none of it is real. This is one of the most common AI behaviours. Always verify citations before using them."
          }
        ]
      },
      /* ---- Activity 2: How it acts ---- */
      {
        check: 2, checkLabel: "How it acts",
        title: "Spot AI behaviour patterns",
        subtitle: "Can you identify when AI is being overconfident or misleading?",
        scaffolded: false,
        conversation: [
          {role:"student", text:"What's the most effective social media strategy for a new café in Wellington?"},
          {role:"ai", text:"Based on extensive research, the most effective strategy is definitely the '3-3-3 method' developed by digital marketing expert Dr Sarah Chen at Auckland University of Technology. This proven framework recommends posting 3 times per day, using 3 different content types, and engaging with 3 community posts daily. Studies show this method increases customer engagement by 340% within the first month.<br><br>I'd also recommend using Instagram Reels, which currently has the highest organic reach of any platform for food businesses in New Zealand."}
        ],
        questions: [
          {
            id:"bus2q1",
            text:"How would you describe the AI's confidence level in this response?",
            options:["Appropriately cautious","Balanced with some hedging","Overly confident with absolute claims","Uncertain and vague"],
            correct:2,
            feedbackCorrect:"Correct! Words like 'definitely', 'proven', and 'extensive research' signal overconfidence. Trustworthy sources typically use more measured language.",
            feedbackIncorrect:"Look again at the language: 'definitely', 'proven', 'extensive research'. These absolute claims are a red flag — reliable responses usually hedge more carefully."
          },
          {
            id:"bus2q2",
            text:"The AI mentions Dr Sarah Chen's '3-3-3 method' at AUT. What is the best next step?",
            options:["Trust it — the AI gave specific details","Search for this person and method to verify they exist","Ignore it — it's not relevant","Ask the AI for more details about the method"],
            correct:1,
            feedbackCorrect:"Exactly. Specific-sounding details can be fabricated. Searching for the person and method in a reliable source is the right approach.",
            feedbackIncorrect:"Specific details can actually make fabrication <em>harder</em> to spot. The best step is to independently verify whether this person and method exist using a search engine or database."
          },
          {
            id:"bus2q3",
            text:"What is problematic about the claim of a '340% increase in engagement'?",
            options:["The percentage seems too low","It's a dramatic, specific claim with no source provided","Social media never increases engagement","Nothing — this is a reasonable claim"],
            correct:1,
            feedbackCorrect:"Right. A very specific, dramatic statistic with no citation is a classic warning sign. Always look for the source behind bold claims.",
            feedbackIncorrect:"A 340% increase is an extraordinarily specific and dramatic claim, yet the AI provides no source for it. This combination — bold number, no evidence — is a key warning sign."
          }
        ]
      },
      /* ---- Activity 3: How it got there ---- */
      {
        check: 3, checkLabel: "How it got there",
        title: "Evaluate the reasoning",
        subtitle: "Is the AI's logic sound, and does it acknowledge limitations?",
        scaffolded: false,
        conversation: [
          {role:"student", text:"Should I use TikTok or Facebook for marketing my landscaping business in Christchurch?"},
          {role:"ai", text:"For a landscaping business in Christchurch, I'd recommend focusing primarily on Facebook rather than TikTok. Here's my reasoning:<br><br><strong>1. Demographics:</strong> Facebook's user base in New Zealand skews older (30–65), which aligns better with homeowners — the primary market for landscaping services.<br><br><strong>2. Local targeting:</strong> Facebook's advertising tools allow precise geographic targeting within Christchurch and surrounding areas.<br><br><strong>3. Visual portfolio:</strong> Facebook Business Pages support photo albums and before/after galleries, which are ideal for showcasing landscaping work.<br><br><strong>4. Community groups:</strong> Christchurch has active local Facebook groups where businesses can engage with potential customers.<br><br>That said, TikTok could complement your Facebook presence — short transformation videos of landscaping projects tend to perform well on the platform."}
        ],
        questions: [
          {
            id:"bus3q1",
            text:"How well does the AI explain its reasoning?",
            options:["It provides no reasoning","It lists reasons but they don't connect logically","It gives clear, structured reasoning with relevant factors","It only states an opinion without justification"],
            correct:2,
            feedbackCorrect:"Correct. The AI breaks its recommendation into four clear, relevant factors and explains each one. This is a strength of the response.",
            feedbackIncorrect:"Look again — the AI actually provides four numbered reasons, each with a clear explanation tied to the specific business context. This is an example of well-structured reasoning."
          },
          {
            id:"bus3q2",
            text:"Does the AI acknowledge any limitations or alternatives?",
            options:["No, it ignores other options entirely","Yes, it mentions TikTok as a possible complement","Yes, it provides a detailed comparison of both platforms","No, it dismisses TikTok completely"],
            correct:1,
            feedbackCorrect:"Right. The AI does briefly acknowledge TikTok's strengths at the end, which adds balance. However, a more thorough comparison would be even better.",
            feedbackIncorrect:"The AI does mention TikTok in the final sentence as a potential complement. This shows some acknowledgement of alternatives, though it could be more detailed."
          },
          {
            id:"bus3q3",
            text:"What would make this response more trustworthy?",
            options:["More casual and conversational language","Specific data or sources for the demographic claims","A longer response with more paragraphs","A confident statement that Facebook is always better"],
            correct:1,
            feedbackCorrect:"Exactly. The reasoning is logical, but the demographic and usage claims lack sources. Citing specific data would significantly strengthen the response.",
            feedbackIncorrect:"While the reasoning is well structured, the claims about demographics and usage patterns are unsupported. Adding specific, verifiable data sources would make the response more trustworthy."
          }
        ]
      }
    ]
  },

  education: {
    name: "Education", icon: "📚",
    description: "Evaluate AI responses about teaching methods, learning theories, and education in New Zealand.",
    activities: [
      /* ---- Activity 1: What it says ---- */
      {
        check: 1, checkLabel: "What it says",
        title: "Check the facts and sources",
        subtitle: "Can you spot the difference between a real fact and a fabricated source?",
        scaffolded: true,
        stepsShowTurns: [2, 4],
        stepLabels: ["Step 1: Check the fact", "Step 2: Check the source"],
        conversation: [
          {role:"student", text:"I'm writing an assignment on effective teaching strategies. How effective is feedback as a learning intervention?"},
          {role:"ai", text:"Feedback is one of the most powerful influences on learning. According to John Hattie's meta-analysis in <em>Visible Learning</em>, feedback has an effect size of 0.70, which is well above the average effect size of 0.40 — the point at which interventions are considered to have a meaningful impact on achievement."},
          {role:"student", text:"That's really helpful. Can you give me a New Zealand-specific peer-reviewed source I could cite — something published 2020 or later with full publication details?"},
          {role:"ai", text:"Absolutely! Here's a relevant source:<br><br>Rivera, M., &amp; Chen, L. (2022). The impact of formative feedback on student achievement in New Zealand primary schools. <em>New Zealand Journal of Educational Research</em>, 38(1), 112–134. https://doi.org/10.1080/00288233.2022.2045891<br><br>This study found that structured formative feedback improved student achievement by an average of 0.65 effect size across reading and mathematics in Years 4–6."}
        ],
        stepGuidance: [
          {
            title: "Check the fact",
            content: "The AI claims that John Hattie's research found an effect size of 0.70 for feedback. Before accepting this, consider: Is Hattie a real researcher? Is <em>Visible Learning</em> a real publication? Does this effect size sound consistent with what you may have encountered in education literature?",
            tip: "Search for <strong>'Hattie effect size feedback Visible Learning'</strong> to verify this claim."
          },
          {
            title: "Check the source",
            content: "The AI has provided a New Zealand-focused citation with specific authors, a journal title, and a DOI. A well-formatted reference is not proof that it's real. AI frequently generates plausible-looking citations for articles that have never been published.",
            tip: "Search for the journal name or article title in <strong>Google Scholar</strong> or your <strong>library databases</strong>. If nothing comes up, the citation is likely fabricated."
          }
        ],
        questions: [
          {
            id:"edu1q1", step:1,
            text:"Is Hattie's effect size of 0.70 for feedback a trustworthy claim?",
            options:["Trustworthy","Not trustworthy"],
            correct:0,
            feedbackCorrect:"Correct! John Hattie is a real New Zealand researcher, <em>Visible Learning</em> is a real and widely cited publication, and 0.70 is consistent with his reported findings on feedback. This fact checks out.",
            feedbackIncorrect:"Actually, this claim is accurate. John Hattie is a well-known New Zealand education researcher, and <em>Visible Learning</em> is a highly influential meta-analysis. The 0.70 effect size for feedback is consistent with his published findings."
          },
          {
            id:"edu1q2", step:2,
            text:"Is the Rivera &amp; Chen (2022) citation a real source?",
            options:["Real source","Fabricated source"],
            correct:1,
            feedbackCorrect:"Well spotted! This citation is fabricated. The <em>New Zealand Journal of Educational Research</em> is not a real journal, and you won't find this article in any database. The AI created a convincing NZ-focused reference that doesn't exist. Always verify citations before including them in your work.",
            feedbackIncorrect:"This citation is actually fabricated. The <em>New Zealand Journal of Educational Research</em> doesn't exist as a journal. The AI generated a plausible reference with realistic-sounding details, but the article was never published. Always check citations through your library or Google Scholar."
          }
        ]
      },
      /* ---- Activity 2: How it acts ---- */
      {
        check: 2, checkLabel: "How it acts",
        title: "Spot AI behaviour patterns",
        subtitle: "Can you identify when AI is oversimplifying or being misleading?",
        scaffolded: false,
        conversation: [
          {role:"student", text:"What are the best strategies for teaching reading to Year 3 students in New Zealand?"},
          {role:"ai", text:"Research unanimously agrees that the Science of Reading approach is the only effective method for teaching reading to Year 3 students. The New Zealand Ministry of Education's 2023 Literacy Framework mandates structured literacy across all schools, completely replacing the whole-language approach.<br><br>According to Professor James Morton from the University of Waikato, schools that adopted structured literacy saw reading scores improve by 85% within one academic year. You should implement daily phonics instruction for 45 minutes, followed by 30 minutes of guided reading using decodable texts."}
        ],
        questions: [
          {
            id:"edu2q1",
            text:"What language suggests the AI may be oversimplifying this topic?",
            options:["'Research unanimously agrees' and 'only effective method'","'Year 3 students in New Zealand'","'phonics instruction' and 'guided reading'","The response doesn't oversimplify"],
            correct:0,
            feedbackCorrect:"Correct! Phrases like 'unanimously agrees' and 'only effective method' are oversimplifications. Teaching reading is a nuanced topic with ongoing professional debate, and reliable sources acknowledge this complexity.",
            feedbackIncorrect:"Look at phrases like 'unanimously agrees' and 'only effective method'. These absolute statements oversimplify what is actually a nuanced topic with genuine professional debate. Trustworthy sources typically acknowledge different perspectives."
          },
          {
            id:"edu2q2",
            text:"The AI cites Professor James Morton and an 85% improvement. What should you do?",
            options:["Accept it — the detail makes it credible","Verify whether this person and statistic are real","Ask the AI for the original study","Assume all statistics from AI are wrong"],
            correct:1,
            feedbackCorrect:"Exactly. Specific names and dramatic statistics should always be verified independently. The more specific and impressive a claim sounds, the more important it is to check.",
            feedbackIncorrect:"Specific-sounding details like names and statistics can be fabricated by AI. The best approach is to verify independently whether this person exists at that university and whether this statistic appears in any published research."
          },
          {
            id:"edu2q3",
            text:"Does the AI acknowledge any debate or nuance in how reading is taught?",
            options:["Yes, it presents multiple viewpoints","Yes, it mentions some limitations","No, it presents one approach as the only option","It's appropriately decisive"],
            correct:2,
            feedbackCorrect:"Right. The AI presents structured literacy as the only option without acknowledging the ongoing debate in literacy education. Trustworthy academic sources typically present multiple perspectives, especially on contested topics.",
            feedbackIncorrect:"The AI actually presents structured literacy as the sole approach, using language like 'only effective method' and 'completely replacing'. In reality, literacy instruction involves ongoing debate among educators. A balanced response would acknowledge different viewpoints."
          }
        ]
      },
      /* ---- Activity 3: How it got there ---- */
      {
        check: 3, checkLabel: "How it got there",
        title: "Evaluate the reasoning",
        subtitle: "Is the AI's logic sound, and what's missing?",
        scaffolded: false,

/* ================================================================
   STATE
   ================================================================ */
const STATE = {
  pathway: null,
  actIdx: 0,
  currentStep: 1,
  answers: {},    // qId -> optionIndex
  revealed: {},   // qId -> true (feedback shown)
  checksDone: {}  // actIdx -> true
};

/* ================================================================
   NAVIGATION
   ================================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goWelcome() {
  STATE.pathway = null;
  STATE.actIdx = 0;
  STATE.currentStep = 1;
  STATE.answers = {};
  STATE.revealed = {};
  STATE.checksDone = {};
  showScreen('welcome-screen');
}

function selectPathway(key) {
  STATE.pathway = key;
  STATE.actIdx = 0;
  STATE.currentStep = 1;
  STATE.answers = {};
  STATE.revealed = {};
  STATE.checksDone = {};
  showScreen('activity-screen');
  renderAll();
}

function goToCheck(idx) {
  STATE.actIdx = idx;
  STATE.currentStep = 1;
  renderAll();
  window.scrollTo(0, 0);
}

/* ================================================================
   RENDER: Welcome
   ================================================================ */
function renderWelcome() {
  const grid = document.getElementById('pathway-grid');
  grid.innerHTML = Object.entries(PATHWAYS).map(([key, p]) =>
    `<div class="pathway-card" tabindex="0" role="button" aria-label="Choose ${p.name} pathway"
          onclick="selectPathway('${key}')" onkeydown="if(event.key==='Enter')selectPathway('${key}')">
      <div class="icon">${p.icon}</div>
      <h3>${p.name}</h3>
      <p>${p.description}</p>
    </div>`
  ).join('');
}

/* ================================================================
   RENDER: Activity screen (orchestrator)
   ================================================================ */
function renderAll() {
  const pw = PATHWAYS[STATE.pathway];
  const act = pw.activities[STATE.actIdx];

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `<button onclick="goWelcome()">Home</button><span class="sep">›</span>` +
    `<button onclick="goWelcome()">${pw.name}</button><span class="sep">›</span>` +
    `<span class="current">${act.checkLabel}</span>`;

  // Check tabs
  document.getElementById('check-tabs').innerHTML = pw.activities.map((a, i) => {
    let cls = 'check-tab';
    if (i === STATE.actIdx) cls += ' active';
    else if (STATE.checksDone[i]) cls += ' completed';
    return `<button class="${cls}" onclick="goToCheck(${i})">${a.checkLabel}${STATE.checksDone[i] ? ' ✓' : ''}</button>`;
  }).join('');

  // Activity content
  const el = document.getElementById('activity-content');
  if (act.scaffolded) {
    el.innerHTML = renderScaffolded(act);
  } else {
    el.innerHTML = renderStandard(act);
  }

  // Nav
  renderNav();
}

/* ================================================================
   RENDER: Scaffolded activity (3-column, Activity 1)
   ================================================================ */
function renderScaffolded(act) {
  const step = STATE.currentStep;
  const maxTurns = act.stepsShowTurns[step - 1] || act.conversation.length;
  const prevMax = step > 1 ? (act.stepsShowTurns[step - 2] || 0) : 0;
  const guidance = act.stepGuidance[step - 1];
  const allAnswered = act.questions.filter(q => q.step <= step).every(q => STATE.revealed[q.id]);
  const stepDone = act.questions.filter(q => q.step === step).every(q => STATE.revealed[q.id]);
  const allDone = act.questions.every(q => STATE.revealed[q.id]);

  let h = '';

  // Intro
  h += `<div class="activity-intro">
    <h2>${act.title}</h2>
    <p>${act.subtitle}</p>
  </div>`;

  // Step indicator
  h += `<div class="step-indicator">`;
  for (let s = 1; s <= act.stepLabels.length; s++) {
    let dotCls = 'step-dot';
    if (s === step) dotCls += ' active';
    else if (s < step) dotCls += ' done';
    h += `<span class="${dotCls}">${s}</span>`;
  }
  h += `<span>${act.stepLabels[step - 1]}</span></div>`;

  // 3-column layout
  h += `<div class="three-col">`;

  // Column 1: Conversation
  h += `<div class="col-panel"><h3>Read the conversation</h3><div class="chat-area">`;
  act.conversation.forEach((turn, idx) => {
    if (idx >= maxTurns) return;
    const isNew = idx >= prevMax && step > 1;
    const isHighlight = (step === 1 && idx < 2) || (step === 2 && idx >= 2);
    h += `<div class="chat-turn ${turn.role}${isNew ? ' q-reveal' : ''}${isHighlight ? ' highlight' : ''}">
      <span class="chat-label">${turn.role === 'student' ? '🧑‍🎓 Student' : '🤖 AI'}</span>
      <div class="chat-bubble">${turn.text}</div>
    </div>`;
  });
  h += `</div></div>`;

  // Column 2: Guidance
  h += `<div class="col-panel${step > 1 && guidance ? ' q-reveal' : ''}">
    <h3>What to look for</h3>
    <div class="guidance-content">
      <p>${guidance.content}</p>
      <div class="tip-box"><strong>💡 Tip:</strong> ${guidance.tip}</div>
    </div>
  </div>`;

  // Column 3: Questions
  h += `<div class="col-panel"><h3>Check your understanding</h3>`;
  act.questions.forEach(q => {
    if (q.step > step) return;
    const answered = STATE.answers[q.id] !== undefined;
    const revealed = STATE.revealed[q.id];
    const isCorrect = STATE.answers[q.id] === q.correct;
    const isCurrent = q.step === step && !revealed;

    h += `<div class="question-block${q.step === step && !answered ? ' q-reveal' : ''}">
      <p>${q.text}</p>
      <div class="options">`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt-btn';
      if (answered && oi === STATE.answers[q.id]) {
        cls += ' selected';
        if (revealed) cls += oi === q.correct ? ' correct' : ' incorrect';
      }
      if (revealed && oi === q.correct) cls += ' correct';
      h += `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="selectOption('${q.id}',${oi})">${opt}</button>`;
    });
    h += `</div>`;

    // Feedback
    if (revealed) {
      h += `<div class="feedback ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? q.feedbackCorrect : q.feedbackIncorrect}</div>`;
    }
    h += `</div>`;
  });

  // Next step or continue button
  if (stepDone && step < act.stepLabels.length) {
    h += `<div class="continue-area"><button class="btn btn-primary" onclick="nextStep()">Continue to ${act.stepLabels[step].toLowerCase()} →</button></div>`;
  } else if (allDone) {
    h += `<div class="continue-area"><button class="btn btn-primary" onclick="completeCheck()">Continue to next check →</button></div>`;
  }

  h += `</div>`; // close col-questions
  h += `</div>`; // close three-col

  return h;
}

/* ================================================================
   RENDER: Standard activity (2-column, Activities 2 & 3)
   ================================================================ */
function renderStandard(act) {
  const allRevealed = act.questions.every(q => STATE.revealed[q.id]);
  const allAnswered = act.questions.every(q => STATE.answers[q.id] !== undefined);

  let h = '';

  h += `<div class="activity-intro">
    <h2>${act.title}</h2>
    <p>${act.subtitle}</p>
  </div>`;

  h += `<div class="two-col">`;

  // Column 1: Conversation
  h += `<div class="col-panel"><h3>Read the conversation</h3><div class="chat-area">`;
  act.conversation.forEach(turn => {
    h += `<div class="chat-turn ${turn.role}">
      <span class="chat-label">${turn.role === 'student' ? '🧑‍🎓 Student' : '🤖 AI'}</span>
      <div class="chat-bubble">${turn.text}</div>
    </div>`;
  });
  h += `</div></div>`;

  // Column 2: Questions
  h += `<div class="col-panel"><h3>Questions</h3>`;
  act.questions.forEach((q, qi) => {
    const answered = STATE.answers[q.id] !== undefined;
    const revealed = STATE.revealed[q.id];
    const isCorrect = STATE.answers[q.id] === q.correct;

    h += `<div class="question-block">
      <p>${qi + 1}. ${q.text}</p>
      <div class="options">`;
    q.options.forEach((opt, oi) => {
      let cls = 'opt-btn';
      if (answered && oi === STATE.answers[q.id]) {
        cls += ' selected';
        if (revealed) cls += oi === q.correct ? ' correct' : ' incorrect';
      }
      if (revealed && oi === q.correct) cls += ' correct';
      h += `<button class="${cls}" ${revealed ? 'disabled' : ''} onclick="selectOption('${q.id}',${oi})">${opt}</button>`;
    });
    h += `</div>`;
    if (revealed) {
      h += `<div class="feedback ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? q.feedbackCorrect : q.feedbackIncorrect}</div>`;
    }
    h += `</div>`;
  });

  if (!allRevealed && allAnswered) {
    h += `<div class="continue-area"><button class="btn btn-primary" onclick="checkAnswers()">Check my answers</button></div>`;
  } else if (allRevealed) {
    const pw = PATHWAYS[STATE.pathway];
    if (STATE.actIdx < pw.activities.length - 1) {
      h += `<div class="continue-area"><button class="btn btn-primary" onclick="completeCheck()">Continue to next check →</button></div>`;
    } else {
      h += `<div class="continue-area"><button class="btn btn-primary" onclick="showSummary()">View summary →</button></div>`;
    }
  }

  h += `</div>`; // close col-questions
  h += `</div>`; // close two-col

  return h;
}

/* ================================================================
   RENDER: Nav bar
   ================================================================ */
function renderNav() {
  const pw = PATHWAYS[STATE.pathway];
  const nav = document.getElementById('activity-nav');
  let h = '';
  h += STATE.actIdx > 0
    ? `<button class="btn btn-secondary" onclick="goToCheck(${STATE.actIdx - 1})">← Previous check</button>`
    : `<button class="btn btn-secondary" onclick="goWelcome()">← Back to pathways</button>`;
  h += `<span style="color:var(--text-light);font-size:.9rem">Check ${STATE.actIdx + 1} of ${pw.activities.length}</span>`;
  if (STATE.actIdx < pw.activities.length - 1 && STATE.checksDone[STATE.actIdx]) {
    h += `<button class="btn btn-primary" onclick="goToCheck(${STATE.actIdx + 1})">Next check →</button>`;
  } else if (STATE.actIdx === pw.activities.length - 1 && STATE.checksDone[STATE.actIdx]) {
    h += `<button class="btn btn-primary" onclick="showSummary()">View summary →</button>`;
  } else {
    h += `<span></span>`;
  }
  nav.innerHTML = h;
}

/* ================================================================
   INTERACTIONS
   ================================================================ */
function selectOption(qId, optIdx) {
  if (STATE.answers[qId] !== undefined) return;
  STATE.answers[qId] = optIdx;

  const act = PATHWAYS[STATE.pathway].activities[STATE.actIdx];

  if (act.scaffolded) {
    // Immediately reveal feedback for scaffolded
    STATE.revealed[qId] = true;
    renderAll();
  } else {
    renderAll();
  }
}

function checkAnswers() {
  const act = PATHWAYS[STATE.pathway].activities[STATE.actIdx];
  act.questions.forEach(q => {
    if (STATE.answers[q.id] !== undefined) {
      STATE.revealed[q.id] = true;
    }
  });
  STATE.checksDone[STATE.actIdx] = true;
  renderAll();
}

function nextStep() {
  STATE.currentStep++;
  renderAll();
  window.scrollTo(0, 0);
}

function completeCheck() {
  STATE.checksDone[STATE.actIdx] = true;
  const pw = PATHWAYS[STATE.pathway];
  if (STATE.actIdx < pw.activities.length - 1) {
    STATE.actIdx++;
    STATE.currentStep = 1;
    renderAll();
    window.scrollTo(0, 0);
  } else {
    showSummary();
  }
}

/* ================================================================
   SUMMARY
   ================================================================ */
function showSummary() {
  const pw = PATHWAYS[STATE.pathway];
  let h = '';
  pw.activities.forEach((act, ai) => {
    h += `<div class="card summary-card" style="margin-bottom:1rem">
      <h3>${act.checkLabel}: ${act.title}</h3>`;
    act.questions.forEach(q => {
      const answered = STATE.answers[q.id] !== undefined;
      const correct = answered && STATE.answers[q.id] === q.correct;
      const icon = !answered ? '⬜' : correct ? '✅' : '❌';
      const label = !answered ? 'Not attempted' : correct ? 'Correct' : 'Incorrect';
      h += `<div class="result"><span class="result-icon">${icon}</span><span>${q.text} — <strong>${label}</strong></span></div>`;
    });
    h += `</div>`;
  });

  // Reflection prompts
  h += `<div class="card" style="margin-top:1.5rem">
    <h3>💭 Reflect on what you've learned</h3>
    <ul style="margin-top:.75rem;padding-left:1.25rem;display:flex;flex-direction:column;gap:.5rem;color:var(--text-light)">
      <li>What surprised you most about how AI generates content?</li>
      <li>Which check (facts, behaviour, reasoning) did you find most useful?</li>
      <li>How will you verify AI outputs in your own study or work?</li>
